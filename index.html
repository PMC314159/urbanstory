<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어둠탐사기록 괴담 문서 제작기</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{
      --ink:#111;
      --paper:#fff;
      --line:#d9d9d9;
      --panel:#f5f5f5;
      --accent:#9d2f2a;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      font-weight:400;
      color:#111;
      background:#ececec;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
    }

    .editor{
      position:sticky;
      top:0;
      height:100vh;
      overflow:auto;
      padding:24px;
      background:#171717;
      color:#f7f7f7;
      border-right:1px solid #2b2b2b;
    }

    .editor h1{
      margin:0 0 6px;
      font-size:22px;
      letter-spacing:-.03em;
    }

    .editor .sub{
      margin:0 0 24px;
      color:#aaa;
      font-size:13px;
      line-height:1.6;
    }

    .group{
      padding:16px;
      margin-bottom:14px;
      border:1px solid #303030;
      border-radius:14px;
      background:#202020;
    }

    .group-title{
      margin:0 0 12px;
      font-size:13px;
      color:#cfcfcf;
      font-weight:700;
      letter-spacing:.02em;
    }

    label{
      display:block;
      margin:10px 0 6px;
      font-size:12px;
      color:#bcbcbc;
    }

    input[type="text"], select, textarea{
      width:100%;
      border:1px solid #3c3c3c;
      border-radius:10px;
      background:#121212;
      color:#fff;
      padding:10px 11px;
      outline:none;
    }

    textarea{min-height:100px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#777}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row.three{grid-template-columns:1fr 1fr 1fr}

    .color-line{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input[type="color"]{
      width:44px;
      height:38px;
      padding:2px;
      border:1px solid #3c3c3c;
      border-radius:10px;
      background:#121212;
    }

    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    .btn{
      border:0;
      border-radius:10px;
      padding:11px 12px;
      background:#353535;
      color:#fff;
      font-weight:700;
    }
    .btn:hover{background:#444}
    .btn.primary{background:#f0f0f0;color:#111}
    .btn.primary:hover{background:#fff}
    .btn.danger{background:#572623}
    .btn.accent-btn{background:var(--accent);color:#fff}
    .btn.accent-btn:hover{background:#ad3b35}

    .hint{
      margin:8px 0 0;
      font-size:11px;
      line-height:1.6;
      color:#888;
    }

    .workspace{
      padding:44px 30px 70px;
      overflow:auto;
    }

    .paper-wrap{
      min-width:800px;
      display:flex;
      justify-content:center;
    }

    .paper{
      width:900px;
      height:auto;
      min-height:0;
      padding:28px 84px 58px;
      background:var(--paper);
      box-shadow:0 16px 50px rgba(0,0,0,.14);
      color:var(--ink);
      font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      font-weight:500;
    }

    .document-head{
      margin-bottom:34px;
    }

    .rule{
      font-family:inherit;
      font-size:24px;
      letter-spacing:-1.2px;
      line-height:1;
      white-space:pre;
      font-weight:100;
      font-variation-settings:"wght" 100;
    }

    .breadcrumb{
      margin-top:26px;
      text-align:right;
      font-size:16px;
      font-weight:inherit;
    }

    .title-line{
      margin-bottom:8px;
      font-size:20px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .identity-line{
      margin-bottom:28px;
      font-size:17px;
      line-height:1.8;
      font-family:inherit;
      font-weight:inherit;
    }

    .identity-line *{
      font-family:inherit;
      font-weight:inherit;
    }

    .identity-prefix{font-weight:inherit}
    .identity-value{color:var(--accent);font-weight:inherit}
    .accent-text{color:var(--accent)}

    .content{
      min-height:2.05em;
      height:auto;
      outline:none;
      font-size:16px;
      font-weight:inherit;
      line-height:2.05;
      word-break:keep-all;
      overflow-wrap:anywhere;
      white-space:normal;
    }

    .content p{margin:0 0 22px}
    .content p:last-child{margin-bottom:0}
    .content:empty::before{
      content:"이곳을 클릭한 뒤 괴담 내용을 자유롭게 작성하세요.";
      color:#aaa;
    }

    .redacted{
      font:inherit;
      color:inherit;
    }

    .selected-note{
      margin-top:12px;
      padding:10px 12px;
      border-radius:9px;
      background:#2b2b2b;
      color:#aaa;
      font-size:12px;
      line-height:1.55;
    }

    @media (max-width:1100px){
      .app{grid-template-columns:310px minmax(0,1fr)}
      .editor{padding:18px}
    }

    @media (max-width:820px){
      .app{display:block}
      .editor{position:relative;height:auto}
      .workspace{padding:20px 12px 50px}
      .paper-wrap{min-width:0}
      .paper{
        width:100%;
        min-height:auto;
        padding:24px 30px 42px;
      }
      .breadcrumb{font-size:14px}
      .title-line{font-size:18px}
      .identity-line{font-size:15px}
      .content{font-size:14px}
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="editor" data-html2canvas-ignore="true">
      <h1>괴담 문서 제작기</h1>
      <p class="sub">내용을 채운 뒤 PNG로 저장할 수 있습니다. 문서 본문은 오른쪽에서 직접 수정합니다.</p>

      <section class="group">
        <p class="group-title">기본 정보</p>
        <label for="titleInput">괴담 제목</label>
        <input id="titleInput" type="text" value="자정의 시간" />


        <label for="identityType">초반 식별 형식</label>
        <select id="identityType">
          <option value="daydream">백일몽 주식회사 식별코드</option>
          <option value="disaster">초자연재난관리국 등록번호</option>
          <option value="praise">무명찬란교 · 정원찬양사 교단</option>
          <option value="happy">무명찬란교 · 해피엔딩 교단</option>
          <option value="mimic">무명찬란교 · 흉내장이 교단</option>
        </select>

        <div id="dynamicFields"></div>
      </section>

      <section class="group">
        <p class="group-title">본문 편집</p>
        <div class="btn-grid">
          <button class="btn accent-btn" id="applyRedBtn" type="button">붉은 글씨</button>
          <button class="btn" id="applyBlackBtn" type="button">기본 검정</button>
          <button class="btn" id="insertSquareBtn" type="button">■ 네모 1개</button>
          <button class="btn" id="insertSquaresBtn" type="button">■■ 네모 2개</button>
          <button class="btn" id="boldBtn" type="button">굵게</button>
          <button class="btn" id="clearFormatBtn" type="button">서식 지우기</button>
        </div>
        <p class="hint">본문에서 원하는 글자를 드래그한 뒤 ‘붉은 글씨’를 누르면 문서에 사용된 고정 붉은색으로 통일됩니다. 네모는 현재 커서 위치에 들어갑니다.</p>
      </section>

      <section class="group">
        <p class="group-title">문서 관리</p>
        <div class="btn-grid">
          <button class="btn" id="sampleBtn" type="button">예시 불러오기</button>
          <button class="btn danger" id="clearBtn" type="button">본문 비우기</button>
          <button class="btn primary" id="saveBtn" type="button" style="grid-column:1/-1">PNG 이미지로 저장</button>
        </div>
        <p class="hint">저장 이미지에는 왼쪽 편집창이 포함되지 않습니다.</p>
      </section>
    </aside>

    <section class="workspace">
      <div class="paper-wrap">
        <article class="paper" id="captureArea">
          <header class="document-head">
            <div class="rule">============</div>
            <div class="breadcrumb">어둠탐사기록&nbsp;&nbsp;/&nbsp;&nbsp;괴담</div>
          </header>

          <div class="title-line">[<span id="titlePreview">자정의 시간</span>]</div>
          <div class="identity-line" id="identityPreview"></div>

          <div class="content" id="contentEditor" contenteditable="true" spellcheck="false"></div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const titleInput = document.getElementById('titleInput');
    const titlePreview = document.getElementById('titlePreview');
    const identityType = document.getElementById('identityType');
    const dynamicFields = document.getElementById('dynamicFields');
    const identityPreview = document.getElementById('identityPreview');
    const contentEditor = document.getElementById('contentEditor');
    const ACCENT_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#9d2f2a';
    let savedRange = null;

    const fieldTemplates = {
      daydream: `
        <div class="row three">
          <div><label>영문</label><input data-key="a" type="text" value="E"></div>
          <div><label>숫자</label><input data-key="b" type="text" value="513"></div>
          <div><label>접두부</label><input data-key="prefix" type="text" value="Qterw"></div>
        </div>`,
      disaster: `
        <div class="row">
          <div>
            <label>PSYA 앞 숫자</label>
            <input data-key="a" type="text" inputmode="numeric" value="5013" placeholder="직접 입력" />
          </div>
          <div>
            <label>PSYA 뒤 숫자</label>
            <input data-key="b" type="text" inputmode="numeric" value="2005" placeholder="직접 입력" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>구분 문자</label>
            <input data-key="letter" type="text" value="아" maxlength="1" placeholder="예: 가, 나, 아" />
          </div>
          <div>
            <label>마지막 숫자</label>
            <input data-key="c" type="text" inputmode="numeric" value="25" placeholder="직접 입력" />
          </div>
        </div>
        <p class="hint">각 항목은 직접 입력합니다. 표시 예시: 5013PSYA.2005.아25.</p>`,
      praise: `
        <label>서열 계급</label><input data-key="rank" type="text" value="3" />`,
      happy: `
        <label>서열 계급</label><input data-key="rank" type="text" value="2" />`,
      mimic: `
        <label>서열 계급</label><input data-key="rank" type="text" value="4" />`
    };

    function fieldValues(){
      const values = {};
      dynamicFields.querySelectorAll('[data-key]').forEach(el => values[el.dataset.key] = el.value.trim());
      return values;
    }

    function updateIdentity(){
      const type = identityType.value;
      const v = fieldValues();
      let html = '';

      const intro = `: &lt;<span class="identity-value">어둠탐사기록</span>&gt;에 등장하는 괴담. `;

      if(type === 'daydream'){
        html = `<span class="identity-prefix">${intro}백일몽 주식회사의 식별코드는 </span><span class="identity-value">${escapeHtml(v.prefix || 'Qterw')}-${escapeHtml(v.a || 'E')}-${escapeHtml(v.b || '513')}</span>.`;
      } else if(type === 'disaster'){
        const front = escapeHtml(v.a || '5013');
        const middle = escapeHtml(v.b || '2005');
        const letter = escapeHtml(v.letter || '아');
        const last = escapeHtml(v.c || '25');
        const code = `${front}PSYA.${middle}.${letter}${last}`;
        html = `<span class="identity-prefix">${intro}초자연재난관리국의 등록번호는 </span><span class="identity-value">${code}</span>.`;
      } else {
        const names = {
          praise:'정원찬양사 교단',
          happy:'해피엔딩 교단',
          mimic:'흉내장이 교단'
        };
        html = `<span class="identity-prefix">${intro}무명찬란교의 권능. 서열은 </span><span class="identity-value">${names[type]} 소속 ${escapeHtml(v.rank || '3')}계급</span>.`;
      }

      identityPreview.innerHTML = html;
    }

    function renderFields(){
      dynamicFields.innerHTML = fieldTemplates[identityType.value];
      dynamicFields.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', updateIdentity);
        el.addEventListener('change', updateIdentity);
      });
      updateIdentity();
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function selectionInsideEditor(range){
      const node = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
        ? range.commonAncestorContainer.parentNode
        : range.commonAncestorContainer;
      return node && contentEditor.contains(node);
    }

    function rememberSelection(){
      const selection = window.getSelection();
      if(!selection || !selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      if(selectionInsideEditor(range)) savedRange = range.cloneRange();
    }

    function restoreSelection(){
      contentEditor.focus();
      if(!savedRange) return;
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(savedRange);
    }

    function runEditorCommand(command, value = null){
      restoreSelection();
      document.execCommand(command, false, value);
      rememberSelection();
    }

    function insertHTML(html){
      runEditorCommand('insertHTML', html);
    }

    function squareHTML(count){
      return '■'.repeat(count);
    }

    function loadSample(){
      contentEditor.innerHTML = `
        <p>Qterw-C-43 &lt;출구 없는 지하철역&gt;에서 처음으로 출현.</p>
        <p>자정(00:00)을 기준으로 출현 및 소실을 반복하는 ■■형 괴담. 고등급 어둠 진입 시 이후 발생할 위험을 예고하는 말이나 행동을 보인다.</p>
        <p>기■ ■식 이상 ■■ 동반. 개■가 소실된 직후부터 얼굴■ 목소■에 관한 ■■이 흐려지며, 시간이 지나면 ■■ 자체를 기억하지 못하게 된다.</p>
        <p>■■는 촬영 및 ■록을 통해서도 보존되지 않는다. 촬영물에서는 ■■가 있던 부분만 공백이나 노이즈로 남으며, 문서에서는 ■■의 이름, 외형 및 발언을 기록한 부분이 소실된다.</p>
        <p>현재까지 개체를 기억하는 유일한 인물은 <span class="accent-text">직원 D</span>. 직원 D는 반복해서 ■■와 접촉한 이후에도 ■■의 ■■과 ■굴, 과■■ ■화 내용을 명확히 기억하고 있다.</p>
        <p>직원 D에게만 ■억 소■ ■상이 발■■지 않는 ■인은 <span class="accent-text" style="font-weight:700">밝혀지지 않음</span>.</p>`;
    }

    titleInput.addEventListener('input', () => titlePreview.textContent = titleInput.value || '제목 없음');
    identityType.addEventListener('change', renderFields);

    document.addEventListener('selectionchange', rememberSelection);

    document.querySelectorAll('#applyRedBtn, #applyBlackBtn, #insertSquareBtn, #insertSquaresBtn, #boldBtn, #clearFormatBtn')
      .forEach(button => button.addEventListener('mousedown', event => event.preventDefault()));

    document.getElementById('applyRedBtn').addEventListener('click', () => {
      runEditorCommand('foreColor', ACCENT_COLOR);
    });

    document.getElementById('applyBlackBtn').addEventListener('click', () => {
      runEditorCommand('foreColor', '#111111');
    });

    document.getElementById('insertSquareBtn').addEventListener('click', () => insertHTML(squareHTML(1)));
    document.getElementById('insertSquaresBtn').addEventListener('click', () => insertHTML(squareHTML(2)));
    document.getElementById('boldBtn').addEventListener('click', () => {
      runEditorCommand('bold');
    });
    document.getElementById('clearFormatBtn').addEventListener('click', () => {
      runEditorCommand('removeFormat');
    });

    document.getElementById('sampleBtn').addEventListener('click', loadSample);
    document.getElementById('clearBtn').addEventListener('click', () => {
      if(confirm('본문 내용을 모두 비울까요?')) contentEditor.innerHTML = '';
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const button = document.getElementById('saveBtn');
      const original = button.textContent;
      button.disabled = true;
      button.textContent = '저장 중…';

      const captureArea = document.getElementById('captureArea');

      try{
        // 편집 중인 커서를 없애고, 실제 내용 높이가 반영될 때까지 기다립니다.
        contentEditor.blur();
        await document.fonts.ready;
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const exportWidth = Math.ceil(captureArea.getBoundingClientRect().width);
        const exportHeight = Math.ceil(captureArea.scrollHeight);

        // 모바일 Safari는 너무 큰 캔버스를 만들면 이미지 아래쪽을 잘라 버릴 수 있습니다.
        // 문서 길이에 따라 배율을 자동으로 낮춰 캔버스의 한계 안에 맞춥니다.
        const MAX_CANVAS_SIDE = 8192;
        const MAX_CANVAS_PIXELS = 14000000;
        const scaleBySide = Math.min(
          MAX_CANVAS_SIDE / exportWidth,
          MAX_CANVAS_SIDE / exportHeight
        );
        const scaleByPixels = Math.sqrt(
          MAX_CANVAS_PIXELS / (exportWidth * exportHeight)
        );
        const exportScale = Math.max(0.75, Math.min(2, scaleBySide, scaleByPixels));

        const previousHeight = captureArea.style.height;
        const previousMinHeight = captureArea.style.minHeight;
        captureArea.style.height = `${exportHeight}px`;
        captureArea.style.minHeight = `${exportHeight}px`;

        const canvas = await html2canvas(captureArea, {
          scale: exportScale,
          width: exportWidth,
          height: exportHeight,
          backgroundColor: '#ffffff',
          useCORS: true,
          logging: false,
          windowWidth: exportWidth,
          windowHeight: exportHeight,
          scrollX: 0,
          scrollY: 0
        });

        captureArea.style.height = previousHeight;
        captureArea.style.minHeight = previousMinHeight;

        const safeName = (titleInput.value || '괴담기록').replace(/[\/:*?"<>|]/g, '_');
        const fileName = `${safeName}.png`;
        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(result => result ? resolve(result) : reject(new Error('PNG 변환 실패')), 'image/png');
        });

        // iPhone/iPad Safari에서는 data URL과 download 속성이 무시될 수 있습니다.
        // 가능한 경우 공유 시트를 열어 '이미지 저장'을 선택하게 합니다.
        const file = new File([blob], fileName, { type:'image/png' });
        const canShareFile = navigator.share && navigator.canShare && navigator.canShare({ files:[file] });
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if(isIOS && canShareFile){
          await navigator.share({ files:[file], title:fileName });
        }else{
          const blobUrl = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName;
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
        }
      }catch(error){
        console.error(error);
        alert('이미지 저장 중 문제가 발생했습니다. 브라우저를 새로고침한 뒤 다시 시도해 주세요.');
      }finally{
        button.disabled = false;
        button.textContent = original;
      }
    });

    renderFields();
    loadSample();
  </script>
</body>
</html>
